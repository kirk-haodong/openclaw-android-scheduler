<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#2D3748"/>
  
  <!-- Android robot body -->
  <path d="M70 120 Q70 150 100 150 Q130 150 130 120 L130 90 Q130 60 100 60 Q70 60 70 90 Z" fill="#A4C639"/>
  
  <!-- Android robot head -->
  <ellipse cx="100" cy="70" rx="35" ry="30" fill="#A4C639"/>
  
  <!-- Antenna -->
  <line x1="75" y1="45" x2="65" y2="30" stroke="#A4C639" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="45" x2="135" y2="30" stroke="#A4C639" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="65" r="5" fill="#2D3748"/>
  <circle cx="112" cy="65" r="5" fill="#2D3748"/>
  
  <!-- Arms -->
  <path d="M68 100 L55 110 Q50 115 55 125 L58 130" stroke="#A4C639" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M132 100 L145 110 Q150 115 145 125 L142 130" stroke="#A4C639" stroke-width="8" stroke-linecap="round" fill="none"/>
  
  <!-- Legs -->
  <path d="M85 150 L85 170" stroke="#A4C639" stroke-width="8" stroke-linecap="round"/>
  <path d="M115 150 L115 170" stroke="#A4C639" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Clock symbol -->
  <circle cx="160" cy="160" r="25" fill="#4A5568" stroke="#A4C639" stroke-width="2"/>
  <line x1="160" y1="160" x2="160" y2="145" stroke="#A4C639" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="160" x2="172" y2="168" stroke="#A4C639" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="160" cy="160" r="3" fill="#A4C639"/>
</svg>